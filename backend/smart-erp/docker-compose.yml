services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-erp-postgres
    environment:
      POSTGRES_DB: smart_erp
      POSTGRES_USER: smart_erp
      POSTGRES_PASSWORD: smart_erp
    ports:
      - "5432:5432"
    volumes:
      - smart_erp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_erp -d smart_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smart-erp-redis
    ports:
      - "6379:6379"

volumes:
  smart_erp_pgdata:
