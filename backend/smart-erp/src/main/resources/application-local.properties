# Chạy local không cần PostgreSQL — bật bằng: spring.profiles.active=local
#
# Kiểm kê kho / audit-sessions (Task021+): JDBC dùng bảng Flyway (vd. cột deleted_at từ V12). Profile này tắt Flyway
# và ddl-auto=create-drop trên H2 — schema không khớp mã audit → dễ 500 khi gọi GET /api/v1/inventory/audit-sessions.
# Muốn thử đủ inventory audit: chạy spring.profiles.active=postgres + PostgreSQL đã migrate (./mvnw flyway:migrate).
# Security: mặc định giống root application.properties (permit-all). Khi đã có login + encoder JWT:
#   APP_SECURITY_MODE=jwt-api JWT_SECRET=<utf8-secret-byte-length-ge-32> spring.profiles.active=local
# Postman / protected API: TTL access (phút) khi dùng jwt-api.
app.security.jwt.access-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:30}
spring.datasource.url=jdbc:h2:mem:smart_erp_local;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.flyway.enabled=false
