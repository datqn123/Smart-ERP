# Khớp với docker-compose.yml (user/password/db). Chạy app: spring.profiles.active=postgres
# JWT (khi APP_SECURITY_MODE=jwt-api): đặt JWT_SECRET (UTF-8, byte length >= 32), không commit vào git.
# Access JWT: mặc định 1 phút; prod có thể tăng qua env JWT_ACCESS_TTL_MINUTES.
app.security.jwt.access-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:1}
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_erp
spring.datasource.username=smart_erp
spring.datasource.password=smart_erp

# Schema do Flyway tạo từ frontend/docs/UC/schema.sql — không để Hibernate sửa bảng
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Redis (LoginSessionRegistry)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
