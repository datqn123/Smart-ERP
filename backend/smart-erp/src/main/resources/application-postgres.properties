# Khớp với docker-compose.yml (user/password/db). Chạy app: spring.profiles.active=postgres
# JWT (khi APP_SECURITY_MODE=jwt-api): đặt JWT_SECRET (UTF-8, byte length >= 32), không commit vào git.
# Postman / Task078: TTL access token đủ thao tác tay (prod giảm qua env).
app.security.jwt.access-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:30}
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_erp
spring.datasource.username=myuser
spring.datasource.password=mypassword

# Schema do Flyway tạo từ frontend/docs/UC/schema.sql — không để Hibernate sửa bảng
spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
