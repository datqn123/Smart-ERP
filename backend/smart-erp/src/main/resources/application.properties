spring.application.name=smart-erp
spring.profiles.default=postgres
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# --- CORS (browser SPA: mini-erp Vite dev = port 3000) ---
# Comma-separated origin patterns. Override in prod with your real FE origin(s).
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

# --- Security / JWT (login prep) ---
# permit-all (default): mọi endpoint mở — phù hợp dev trước khi xong POST /auth/login.
# jwt-api: Resource Server + Bearer JWT; public: /api/v1/auth/** + Swagger (xem JwtResourceServerWebSecurityConfiguration).
app.security.api-protection=${APP_SECURITY_MODE:permit-all}
# Secret UTF-8, độ dài byte >= 32 khi bật jwt-api (HS256). Ưu tiên biến môi trường JWT_SECRET.
# Ký JWT access token (Task001). Production: bắt buộc JWT_SECRET môi trường, đủ ≥ 32 byte UTF-8.
app.security.jwt.secret=${JWT_SECRET:change-me-dev-jwt-secret-32-bytes-min!!}
# Tuỳ chọn — JWT iss / aud (Task001). Để trống = không gửi claim.
# app.security.jwt.issuer=https://api.example.com
# app.security.jwt.audience=smart-erp-api
# Thời gian sống access JWT (phút), tối thiểu 1. Postgres profile ghi đè mặc định 30; prod: JWT_ACCESS_TTL_MINUTES hoặc property này.
# app.security.jwt.access-ttl-minutes=15
